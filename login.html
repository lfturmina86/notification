<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1f2c33">

<script src="pwa-setup.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Sistema Interno</title>
    <link rel="stylesheet" href="global.css">
    <style>
        body { 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
        }

        .login-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-card h2 { color: var(--primary); margin-bottom: 5px; }
        .login-card p { color: var(--text-sub); font-size: 0.9rem; margin-bottom: 25px; }
        .erro-msg { color: var(--danger); font-size: 0.85rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Acesso Restrito</h2>
        <p>Insira suas credenciais para continuar</p>

        <div class="input-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="nome@empresa.com.br" required>
        </div>

        <div class="input-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="••••••••" required>
        </div>

        <button class="btn-primary" id="btn-entrar">Entrar no Sistema</button>
        <p class="erro-msg" id="mensagem-erro">E-mail ou senha incorretos.</p>
    </div>

    <script type="module">
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { auth } from "./firebase-config.js";

        const btnEntrar = document.getElementById('btn-entrar');
        const inputEmail = document.getElementById('email');
        const inputSenha = document.getElementById('senha');
        const msgErro = document.getElementById('mensagem-erro');

        btnEntrar.addEventListener('click', () => {
            const email = inputEmail.value.trim();
            const senha = inputSenha.value.trim();

            if (!email || !senha) return;

            btnEntrar.disabled = true;
            btnEntrar.textContent = "Aguarde...";
            msgErro.style.display = "none";

            // Tenta fazer o login no Firebase
            signInWithEmailAndPassword(auth, email, senha)
                .then((userCredential) => {
                    // Login com sucesso!
                    const user = userCredential.user;
                    console.log("Logado com:", user.email);
                    // Redireciona para o painel principal
                    window.location.href = "index.html"; 
                })
                .catch((error) => {
                    // Falha no login
                    console.error("Erro:", error.code);
                    msgErro.style.display = "block";
                    btnEntrar.disabled = false;
                    btnEntrar.textContent = "Entrar no Sistema";
                });
        });
    </script>
</body>
</html>
